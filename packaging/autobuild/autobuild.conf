# autobuild.conf — configuration for the splitdnsd unattended security self-build.
# Copy to /etc/splitdns/autobuild.conf and edit. Sourced as POSIX shell, so use
# KEY=value with no spaces around '='. All keys are optional; defaults shown.

# Master switch. Set to "no" to disable self-rebuilding entirely (the package can stay
# installed; the timer/hook then do nothing).
#ENABLE=yes

# Where failure notifications are emailed. Defaults to the local "root" alias. Set this
# to a real address (delivered via whatever mail-transport-agent you installed — e.g.
# msmtp-mta relaying to a smarthost; this file never names a specific MTA).
#ADMIN_EMAIL=root

# DNS health check used to confirm the freshly-installed binary is actually serving
# before the upgrade is accepted (otherwise it is rolled back). The query is sent to
# HEALTH_ADDR for HEALTH_NAME; any response (even NXDOMAIN) counts as healthy.
#HEALTH_ADDR=127.0.0.1
#HEALTH_NAME=health.splitdnsd.local

# Build parallelism. The rebuild only compiles (no test suite); keep this low on a small
# resolver so a rebuild never starves DNS for CPU/RAM.
#GOMAXPROCS=2

# Where the source is unpacked and built, and rollback snapshots are kept.
#BUILD_DIR=/var/cache/splitdnsd-selfbuild
